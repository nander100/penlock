<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PenLock — Set Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <div class="safe-frame">
    <h1 class="screen-title" style="font-size:20px;">Set Password <span class="sub" id="attempt-label">(1 / 3)</span></h1>
    <div class="sig-box">
      <canvas id="canvas"></canvas>
      <p class="sig-label" id="enroll-hint">~ Draw your signature</p>
    </div>
<button onclick="undoLastSignature()">Undo last signature</button>

  </div>
  <script src="{{ url_for('static', filename='js/canvas.js') }}"></script>
</body>
</html>
