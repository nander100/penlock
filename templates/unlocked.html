<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PenLock — Unlocked</title>
  <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <div class="safe-frame">
    <h1 class="screen-title">Unplocked</h1>
    <div style="display:flex; flex-direction:column; align-items:center; gap:0.75rem; width:100%; max-width:320px;">
      <a href="/set_password" style="width:100%">
        <button class="btn btn-yellow" id="set-password-btn">Set Password</button>
      </a>
      <button class="btn btn-pink" id="lock-btn" style="width:100%">Lock Safe</button>
    </div>
  </div>

  <script>
    document.getElementById('lock-btn').addEventListener('click', async () => {
      try {
        await fetch('/lock', { method: 'POST' });
      } catch (e) {
        console.log('Lock signal failed:', e);
      }
      window.location.href = '/plocking';
    });

    document.getElementById('set-password-btn').addEventListener('click', async () => {
      try {
        await fetch('/lock', { method: 'POST' });
      } catch (e) {
        console.log('cant set password:', e);
      }
      window.location.href = '/set_password';
    });
  </script>
</body>
</html>
