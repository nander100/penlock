<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PenLock — Unlocked</title>
  <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <style>
    /* unlocked-specific: title takes up top half, buttons bottom half */
    .safe-frame { justify-content: space-around; }
  </style>
</head>
<body>
  <div class="safe-frame">
    <h1 class="screen-title">Unplocked</h1>
    <div style="display:flex; flex-direction:column; align-items:center; gap:0.75rem; width:100%; max-width:320px;">
      <a href="/set-password" style="width:100%">
        <button class="btn btn-yellow">Set Password</button>
      </a>
      <a href="/plocking" style="width:100%">
        <button class="btn btn-pink">Lock Safe</button>
      </a>
    </div>
  </div>
</body>
</html>
